version: "3.9"

services:

  mongo:
    image: mongo:7
    container_name: crowdfunder_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: crowdfunder_backend
    restart: always
    ports:
      - "1010:1010"
    env_file:
      - ./backend/.env.dev
    environment:
      - DATABASE_URL=mongodb+srv://mouadcharadi021_db_user:9OtH8jO2P8UibYyi@cluster0.coselis.mongodb.net/?appName=Cluster0
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: crowdfunder_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
